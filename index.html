<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="StudyNotes — Upload, discover, and collaborate on study notes with students worldwide.">
  <title>StudyNotes — Collaborative Study Notes Platform</title>

  <!-- Google Font -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <!-- Stylesheets -->
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/components2.css">
  <link rel="stylesheet" href="css/pages.css">

  <!-- Favicon (data URI for portability) -->
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📚</text></svg>">
</head>
<body>

  <!-- ===== NAVBAR ===== -->
  <nav class="navbar" id="navbar">
    <div class="navbar__inner">
      <div class="navbar__brand" onclick="App.navigate('home')">
        <div class="navbar__brand-icon">📚</div>
        <span class="hide-mobile">StudyNotes</span>
      </div>

      <div class="navbar__links hide-mobile">
        <span class="navbar__link" data-route="home" onclick="App.navigate('home')">Home</span>
        <span class="navbar__link" data-route="notes" onclick="App.navigate('notes')">Browse</span>
        <span class="navbar__link" data-route="dashboard" onclick="App.navigate('dashboard')">Dashboard</span>
        <span class="navbar__link" data-route="admin" onclick="App.navigate('admin')" style="display:none">Admin</span>
      </div>

      <div class="navbar__actions">
        <button class="theme-toggle" id="theme-toggle" title="Toggle theme">🌙</button>

        <!-- Auth links (shown when logged out) -->
        <div id="nav-auth-links" style="display:flex;gap:var(--space-2)">
          <button class="btn btn--ghost btn--sm" onclick="App.navigate('login')">Log In</button>
          <button class="btn btn--primary btn--sm" onclick="App.navigate('register')">Sign Up</button>
        </div>

        <!-- User menu (shown when logged in) -->
        <div class="navbar__user dropdown" id="nav-user-area" style="display:none">
          <div onclick="UI.toggleDropdown(this)" style="display:flex;align-items:center;gap:var(--space-2)">
            <span id="nav-user-avatar"></span>
            <div class="hide-mobile">
              <div id="nav-user-name" class="navbar__user-name"></div>
              <div id="nav-user-role" class="navbar__user-role"></div>
            </div>
            <span class="text-xs hide-mobile">▼</span>
          </div>
          <div class="dropdown__menu">
            <button class="dropdown__item" onclick="App.navigate('dashboard')">📊 Dashboard</button>
            <button class="dropdown__item" onclick="App.navigate('profile')">👤 Profile</button>
            <button class="dropdown__item" onclick="App.navigate('upload')">📤 Upload Note</button>
            <button class="dropdown__item" data-route="admin" onclick="App.navigate('admin')" style="display:none">⚙️ Admin Panel</button>
            <div class="dropdown__divider"></div>
            <button class="dropdown__item" onclick="Auth.logout()">🚪 Logout</button>
          </div>
        </div>

        <!-- Hamburger (mobile) -->
        <div class="hamburger" id="hamburger">
          <span></span><span></span><span></span>
        </div>
      </div>
    </div>
  </nav>

  <!-- ===== MOBILE MENU ===== -->
  <div class="mobile-menu" id="mobile-menu">
    <span class="navbar__link" data-route="home" onclick="App.navigate('home')">🏠 Home</span>
    <span class="navbar__link" data-route="notes" onclick="App.navigate('notes')">📚 Browse Notes</span>
    <span class="navbar__link" data-route="dashboard" onclick="App.navigate('dashboard')">📊 Dashboard</span>
    <span class="navbar__link" data-route="upload" onclick="App.navigate('upload')">📤 Upload</span>
    <span class="navbar__link" data-route="profile" onclick="App.navigate('profile')">👤 Profile</span>
    <span class="navbar__link" data-route="admin" onclick="App.navigate('admin')" style="display:none">⚙️ Admin</span>
  </div>

  <!-- ===== TOAST CONTAINER ===== -->
  <div class="toast-container" id="toast-container"></div>

  <!-- ===== MODAL ===== -->
  <div class="modal-overlay" id="modal-overlay">
    <div class="modal">
      <div class="modal__header">
        <h3 class="modal__title"></h3>
        <button class="modal__close" id="modal-close">✕</button>
      </div>
      <div class="modal__body"></div>
      <div class="modal__footer"></div>
    </div>
  </div>

  <!-- ===== PAGES ===== -->
  <main>
    <div class="page" id="page-home"></div>
    <div class="page" id="page-login"></div>
    <div class="page" id="page-register"></div>
    <div class="page" id="page-dashboard"></div>
    <div class="page" id="page-notes"></div>
    <div class="page" id="page-note-detail"></div>
    <div class="page" id="page-upload"></div>
    <div class="page" id="page-profile"></div>
    <div class="page" id="page-admin"></div>
  </main>

  <!-- ===== SCRIPTS ===== -->
  <script src="js/data.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/comments.js"></script>
  <script src="js/notes.js"></script>
  <script src="js/admin.js"></script>
  <script src="js/app.js"></script>

</body>
</html>
